<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>資安工程師 歷屆試題特訓系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .option-btn { transition: all 0.2s ease-in-out; }
        @media (min-width: 768px) {
            .option-btn:hover:not(:disabled) { transform: translateX(5px); border-color: #3b82f6; background-color: #eff6ff; }
        }
        .option-btn:active:not(:disabled) { border-color: #3b82f6; background-color: #eff6ff; }
        .option-btn:disabled { cursor: not-allowed; }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        /* 隱藏滾動條但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-gray-800 h-screen flex flex-col relative overflow-hidden">

    <!-- 頂部導航 -->
    <nav class="bg-slate-800 text-white shadow-lg shrink-0">
        <div class="max-w-5xl mx-auto px-4 py-3 flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-2 w-full sm:w-auto justify-center sm:justify-start">
                <i class="fa-solid fa-shield-halved text-blue-400 text-xl md:text-2xl"></i>
                <h1 class="font-bold text-lg md:text-xl tracking-wider whitespace-nowrap">資安特訓中心</h1>
            </div>
            <div class="flex gap-2 w-full sm:w-auto">
                <button onclick="switchTab('practice')" id="tab-practice" class="flex-1 sm:flex-none justify-center px-3 py-2 md:px-4 md:py-2 rounded-md bg-blue-600 hover:bg-blue-500 transition font-medium text-sm md:text-base flex items-center gap-1">
                    <i class="fa-solid fa-gamepad"></i> 實戰演練
                </button>
                <button onclick="switchTab('manage')" id="tab-manage" class="flex-1 sm:flex-none justify-center px-3 py-2 md:px-4 md:py-2 rounded-md bg-slate-700 hover:bg-slate-600 transition font-medium text-sm md:text-base flex items-center gap-1">
                    <i class="fa-solid fa-database"></i> 題庫管理
                </button>
            </div>
        </div>
    </nav>

    <!-- 主內容區 -->
    <main class="flex-grow overflow-auto p-3 md:p-8 flex justify-center items-start">
        
        <!-- 區塊 1：實戰演練 -->
        <section id="practice-section" class="w-full max-w-3xl hidden">
            <!-- 狀態列 -->
            <div class="grid grid-cols-3 gap-2 md:gap-4 mb-4 md:mb-6">
                <div class="glass-panel rounded-xl p-3 md:p-4 shadow-sm text-center">
                    <div class="text-xs md:text-sm text-gray-500 mb-1">總題庫數</div>
                    <div class="text-xl md:text-2xl font-bold text-slate-700" id="stat-total">0</div>
                </div>
                <div class="glass-panel rounded-xl p-3 md:p-4 shadow-sm text-center">
                    <div class="text-xs md:text-sm text-gray-500 mb-1">答對率</div>
                    <div class="text-xl md:text-2xl font-bold text-blue-600" id="stat-accuracy">0%</div>
                </div>
                <div class="glass-panel rounded-xl p-3 md:p-4 shadow-sm text-center relative overflow-hidden">
                    <div class="absolute -right-2 -bottom-2 opacity-10 text-orange-500 text-4xl md:text-5xl"><i class="fa-solid fa-fire"></i></div>
                    <div class="text-xs md:text-sm text-gray-500 mb-1">目前連勝</div>
                    <div class="text-xl md:text-2xl font-bold text-orange-500" id="stat-streak">0</div>
                </div>
            </div>

            <!-- 考題區 -->
            <div class="glass-panel rounded-2xl shadow-lg p-4 md:p-8 relative">
                <!-- 標籤 -->
                <div class="inline-flex items-center gap-2 px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-xs md:text-sm font-semibold mb-3 md:mb-4">
                    <i class="fa-regular fa-calendar-check"></i>
                    <span id="q-source">來源載入中...</span>
                </div>

                <!-- 題目 -->
                <h2 class="text-lg md:text-2xl font-bold mb-4 leading-relaxed text-slate-800" id="q-text">
                    準備好迎接挑戰了嗎？
                </h2>
                
                <!-- 題目圖片區塊 -->
                <div id="q-image-container" class="hidden mb-4 md:mb-6 flex justify-center">
                    <!-- 動態載入圖片 -->
                </div>

                <!-- 選項 -->
                <div class="flex flex-col gap-2 md:gap-3" id="q-options">
                    <!-- 動態產生 -->
                </div>

                <!-- 解答回饋區 -->
                <div id="feedback-area" class="hidden mt-4 md:mt-6 p-4 md:p-5 rounded-xl pop-in">
                    <div class="flex items-center gap-2 md:gap-3 mb-2">
                        <div id="feedback-icon" class="text-xl md:text-2xl"></div>
                        <h3 id="feedback-title" class="text-base md:text-lg font-bold"></h3>
                    </div>
                    <p id="feedback-explanation" class="text-sm md:text-base text-gray-700 leading-relaxed mt-2"></p>
                    
                    <div class="mt-5 md:mt-6 text-right">
                        <button onclick="loadRandomQuestion()" class="w-full sm:w-auto bg-slate-800 hover:bg-slate-700 text-white px-6 py-3 md:py-2 rounded-lg font-medium shadow-md transition transform hover:scale-105 active:scale-95">
                            下一題 <i class="fa-solid fa-arrow-right ml-1"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 區塊 2：題庫管理 -->
        <section id="manage-section" class="w-full max-w-3xl hidden">
            <div class="glass-panel rounded-2xl shadow-lg p-4 md:p-8">
                <h2 class="text-xl md:text-2xl font-bold mb-2 text-slate-800">題庫管理系統</h2>
                <p class="text-xs md:text-sm text-gray-500 mb-4 md:mb-6">目前的題庫皆儲存在您的設備本機中。您可以自由手動新增、編輯、刪除單一題目，或批次匯入/匯出。</p>

                <div class="grid md:grid-cols-2 gap-4 md:gap-6">
                    <!-- 匯入區 -->
                    <div class="border-2 border-dashed border-gray-300 rounded-xl p-4 md:p-6 text-center hover:border-blue-500 transition group bg-white flex flex-col items-center justify-center">
                        <i class="fa-solid fa-cloud-arrow-up text-3xl md:text-4xl text-gray-400 group-hover:text-blue-500 mb-2 md:mb-3 transition"></i>
                        <h3 class="font-bold text-base md:text-lg mb-1">批次匯入題庫</h3>
                        <p class="text-xs md:text-sm text-gray-500 mb-3 md:mb-4">支援 JSON 格式檔案</p>
                        
                        <input type="file" id="file-upload" accept=".json" class="hidden" onchange="handleFileUpload(event)">
                        <label for="file-upload" class="cursor-pointer bg-blue-50 text-blue-600 px-4 py-2.5 rounded-md font-medium hover:bg-blue-100 transition inline-block w-full sm:w-auto text-sm md:text-base">
                            選擇檔案
                        </label>
                    </div>

                    <!-- 下載與重置區 -->
                    <div class="flex flex-col gap-2 md:gap-3 justify-center">
                        <button onclick="showAddModal(-1)" class="flex items-center justify-center gap-2 bg-blue-600 text-white px-4 py-3 md:py-3 rounded-xl hover:bg-blue-500 transition shadow-md font-bold text-sm md:text-base">
                            <i class="fa-solid fa-plus"></i> 手動新增單筆考題
                        </button>
                        <button onclick="downloadCurrentBank()" class="flex items-center justify-center gap-2 bg-white border border-gray-300 text-gray-700 px-4 py-2.5 rounded-xl hover:bg-gray-50 transition shadow-sm font-medium text-sm md:text-base">
                            <i class="fa-solid fa-file-export text-gray-500"></i> 匯出題庫 (備份)
                        </button>
                        <button onclick="downloadTemplate()" class="flex items-center justify-center gap-2 bg-white border border-gray-300 text-gray-500 px-4 py-2.5 rounded-xl hover:bg-gray-50 transition shadow-sm font-medium text-xs md:text-sm">
                            <i class="fa-solid fa-download text-gray-400"></i> 下載上傳範本
                        </button>
                        <button onclick="resetBank()" class="flex items-center justify-center gap-2 bg-red-50 text-red-600 border border-red-200 px-4 py-2.5 rounded-xl hover:bg-red-100 transition shadow-sm font-medium text-xs md:text-sm mt-1 md:mt-2">
                            <i class="fa-solid fa-rotate-right"></i> 恢復原廠預設題庫
                        </button>
                    </div>
                </div>

                <!-- 題庫列表預覽 -->
                <div class="mt-6 md:mt-8">
                    <h3 class="font-bold text-base md:text-lg mb-2 md:mb-3 border-b pb-2 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-1">
                        <span>目前題庫總覽 (<span id="preview-count">0</span> 題)</span>
                        <span class="text-xs font-normal text-gray-400">最新新增的題目會顯示在最上方</span>
                    </h3>
                    <div id="bank-preview" class="max-h-80 md:max-h-96 overflow-y-auto space-y-2 md:space-y-3 pr-1 md:pr-2 custom-scrollbar">
                        <!-- 動態產生 -->
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- 新增/編輯 題目 Modal 表單 -->
    <div id="add-modal" class="fixed inset-0 bg-black/60 hidden justify-center items-center z-50 p-2 md:p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[95vh] flex flex-col pop-in mx-auto">
            <div class="p-4 md:p-5 border-b flex justify-between items-center bg-slate-50 rounded-t-2xl">
                <h3 id="modal-title" class="text-lg md:text-xl font-bold text-slate-800"><i class="fa-solid fa-plus text-blue-500 mr-2"></i>手動新增考題</h3>
                <button onclick="closeAddModal()" class="text-gray-400 hover:text-gray-600 text-3xl md:text-2xl leading-none p-1">&times;</button>
            </div>
            <div class="p-4 md:p-5 overflow-y-auto flex-grow custom-scrollbar">
                <form id="add-q-form" class="space-y-4 md:space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">來源 / 標籤</label>
                        <input type="text" id="new-q-source" required class="w-full border border-gray-300 rounded-lg px-4 py-3 md:py-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-sm md:text-base" placeholder="例如：109年度 - 資訊安全管理概論">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">題目內容</label>
                        <textarea id="new-q-text" required rows="3" class="w-full border border-gray-300 rounded-lg px-4 py-3 md:py-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-sm md:text-base" placeholder="請輸入完整題目..."></textarea>
                    </div>
                    
                    <!-- 新增附圖區塊 -->
                    <div class="bg-slate-50 p-3 md:p-4 rounded-xl border border-slate-200">
                        <label class="block text-sm font-bold text-gray-700 mb-2"><i class="fa-regular fa-image mr-1 text-slate-500"></i>題目附圖 (選填)</label>
                        <div class="flex flex-wrap items-center gap-2 md:gap-3">
                            <input type="file" id="new-q-image" accept="image/png, image/jpeg, image/gif, image/webp" class="hidden" onchange="handleImageUpload(event)">
                            <label for="new-q-image" class="cursor-pointer bg-white border border-gray-300 text-gray-700 px-4 py-2.5 md:py-2 rounded-lg text-sm font-medium hover:bg-gray-50 transition shadow-sm w-full sm:w-auto text-center">
                                選擇圖片
                            </label>
                            <button type="button" id="clear-image-btn" onclick="clearUploadedImage()" class="hidden w-full sm:w-auto text-red-500 hover:text-red-700 bg-red-50 sm:bg-transparent text-sm font-medium px-4 py-2.5 md:py-1 rounded-lg sm:rounded-none">
                                <i class="fa-solid fa-trash-can mr-1"></i>移除圖片
                            </button>
                        </div>
                        <div id="image-preview-container" class="mt-3 hidden">
                            <img id="preview-img" src="" class="max-h-40 md:max-h-48 max-w-full rounded-lg border border-gray-300 shadow-sm object-contain bg-white">
                        </div>
                        <p class="text-xs text-gray-400 mt-2">提示：系統會自動壓縮圖片大小以節省儲存空間。</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4 bg-gray-50 p-3 md:p-4 rounded-xl border border-gray-100">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">選項 A</label>
                            <input type="text" id="new-q-optA" required class="w-full border border-gray-300 rounded-lg px-3 py-2.5 md:py-2 text-sm md:text-base">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">選項 B</label>
                            <input type="text" id="new-q-optB" required class="w-full border border-gray-300 rounded-lg px-3 py-2.5 md:py-2 text-sm md:text-base">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">選項 C</label>
                            <input type="text" id="new-q-optC" required class="w-full border border-gray-300 rounded-lg px-3 py-2.5 md:py-2 text-sm md:text-base">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">選項 D</label>
                            <input type="text" id="new-q-optD" required class="w-full border border-gray-300 rounded-lg px-3 py-2.5 md:py-2 text-sm md:text-base">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">正確解答</label>
                        <select id="new-q-ans" class="w-full border border-gray-300 rounded-lg px-4 py-3 md:py-2.5 focus:ring-2 focus:ring-blue-500 outline-none bg-white font-bold text-blue-700 text-sm md:text-base">
                            <option value="0">選項 A 為正確解答</option>
                            <option value="1">選項 B 為正確解答</option>
                            <option value="2">選項 C 為正確解答</option>
                            <option value="3">選項 D 為正確解答</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">專業解析 (選填)</label>
                        <textarea id="new-q-exp" rows="2" class="w-full border border-gray-300 rounded-lg px-4 py-3 md:py-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-sm md:text-base" placeholder="請輸入答案的解釋或觀念補充..."></textarea>
                    </div>
                </form>
            </div>
            <div class="p-4 border-t bg-white flex flex-col-reverse sm:flex-row justify-end gap-3 rounded-b-2xl shrink-0">
                <button onclick="closeAddModal()" class="w-full sm:w-auto px-6 py-3 md:py-2 rounded-lg font-bold text-gray-600 bg-white border hover:bg-gray-50 transition active:bg-gray-100">取消</button>
                <button id="modal-submit-btn" onclick="saveNewQuestion()" class="w-full sm:w-auto px-6 py-3 md:py-2 rounded-lg font-bold text-white bg-blue-600 hover:bg-blue-700 transition shadow-md active:bg-blue-800">儲存並新增</button>
            </div>
        </div>
    </div>

    <!-- 吐司提示訊息 (Toast) -->
    <div id="toast" class="fixed bottom-5 left-4 right-4 md:left-auto md:right-5 md:w-auto transform translate-y-20 opacity-0 transition-all duration-300 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-xl z-50 flex items-center justify-center md:justify-start gap-3">
        <i class="fa-solid fa-circle-info text-blue-400"></i>
        <span id="toast-msg">訊息</span>
    </div>

    <script>
        // --- 預設精選題庫 (包含108年技術概論完整50題) ---
        const defaultQuestions = [
            {
                "source": "108年度 - 資訊安全技術概論",
                "question": "下列何者「不」是私有網路位址(Private IP)?",
                "options": [
                    "10.0.0.1",
                    "169.254.2.210",
                    "172.31.5.128",
                    "192.168.10.220"
                ],
                "answerIndex": 1,
                "explanation": "169.254.X.X 屬於 APIPA（自動私人 IP 位址）。當設備設定為自動取得 IP 卻找不到 DHCP 伺服器時，系統便會自動配發此網段的 IP，它並不屬於 RFC 1918 所定義的三大標準私有 IP 網段。"
            },
            {
                "source": "108年度 - 資訊安全技術概論",
                "question": "關於網路設備與OSI參考模式,下列敘述何者正確?",
                "options": [
                    "中繼器(Repeater)是在資料鏈結層(Data Link Layer)",
                    "橋接器(Bridge)是在實體層(Physical Layer)",
                    "閘道器(Gateway)是在網路層(Network Layer)",
                    "路由器(Router)是在網路層(Network Layer)"
                ],
                "answerIndex": 3,
                "explanation": "路由器(Router)運作於 OSI 模型的第三層（網路層 Network Layer），負責依據 IP 位址進行封包的路由選擇。中繼器在第一層，橋接器在第二層，閘道器通常運作於第四層以上。"
            },
            {
                "source": "108年度 - 資訊安全技術概論",
                "question": "設定密碼時需注意許多原則規範以免太容易被攻擊者猜出，下列何者是較好的密碼設定？",
                "options": [
                    "QAZWSXEDCRT",
                    "56781344",
                    "qWA$s&1!aBap",
                    "helloworld"
                ],
                "answerIndex": 2,
                "explanation": "高強度密碼應包含大小寫字母、數字及特殊符號，且具備一定長度。選項(C)符合此複雜度原則，而其他選項則過於規律（鍵盤相鄰按鍵）、僅含數字，或是常見的字典單字。"
            },
            {
                "source": "108年度 - 資訊安全技術概論",
                "question": "下列何種應用層的通訊協定，在傳輸的過程中並未對內容進行加密處理？",
                "options": [
                    "SSH",
                    "TLS",
                    "SMTP",
                    "HTTPS"
                ],
                "answerIndex": 2,
                "explanation": "SMTP (Simple Mail Transfer Protocol) 預設為明文傳輸。若要加密需加上 TLS 成為 SMTPS。而 SSH, TLS, HTTPS 本身皆已具備強大的加密機制。"
            },
            {
                "source": "108年度 - 資訊安全技術概論",
                "question": "下列何者「不」是微軟網路芳鄰常見使用Port？",
                "options": [
                    "137",
                    "139",
                    "123",
                    "445"
                ],
                "answerIndex": 2,
                "explanation": "Port 123 是 NTP (網路校時協定) 所使用。而 137、139 (NetBIOS) 以及 445 (SMB) 皆為微軟網路芳鄰進行檔案或印表機分享時常開的連接埠，也是駭客常掃描的目標。"
            },
            {
                "source": "108年度 - 資訊安全技術概論",
                "question": "下列何種防火牆，因僅針對封包標頭進行檢查，並無針對封包資料進行檢查，可能難以抵禦大量封包的分散式攻擊？",
                "options": [
                    "狀態檢查防火牆（Stateful Inspection Firewall）",
                    "應用代理閘道防火牆（Application-proxy Firewall）",
                    "封包過濾防火牆（Packet-filtering Firewall）",
                    "混合型防火牆（Hybrid Firewall）"
                ],
                "answerIndex": 2,
                "explanation": "封包過濾防火牆 (Packet-filtering Firewall) 屬於較早期的技術，運作於網路層，僅檢查 IP 和 Port 等標頭資訊，不檢視酬載 (Payload)，因此難以防禦針對應用層或偽裝正常的 DDoS 攻擊。"
            },
            {
                "source": "108年度 - 資訊安全技術概論",
                "question": "死亡之Ping（Ping of Death, PoD）是針對開放式系統互聯模型（OSI Model）的何層攻擊？",
                "options": [
                    "Layer 2資料連接層（Data-Link Layer）",
                    "Layer 3網路層（Network Layer）",
                    "Layer 4傳送層（Transport Layer）",
                    "Layer 7應用層（Application Layer）"
                ],
                "answerIndex": 1,
                "explanation": "Ping 使用的是 ICMP 協定，該協定運作於 OSI 模型的第三層 (網路層)。死亡之 Ping 是透過發送超過 IP 協定規定最大長度的異常封包，導致目標系統記憶體溢出或當機。"
            },

        // --- 系統狀態管理 ---
        let appState = {
            questions: [],
            stats: { totalAnswered: 0, correct: 0, streak: 0, maxStreak: 0 }
        };
        let currentQuestion = null;
        let currentEditIndex = -1; // 記錄目前正在編輯的題目索引 (-1 表示新增)
        let currentUploadedImage = null; // 暫存上傳的圖片 (Base64)

        // --- 初始化與本機儲存 (LocalStorage) ---
        function initApp() {
            // 嘗試載入已儲存的題庫，若無則使用預設題庫
            const savedQuestions = localStorage.getItem('secExamQuestions');
            if (savedQuestions) {
                appState.questions = JSON.parse(savedQuestions);
            } else {
                appState.questions = [...defaultQuestions];
            }
            
            // 載入統計數據
            const savedStats = localStorage.getItem('secExamStats');
            if (savedStats) {
                appState.stats = JSON.parse(savedStats);
            }
            
            updateStatsUI();
            switchTab('practice');
        }

        function saveState() {
            // 儲存統計數據與題庫陣列
            localStorage.setItem('secExamStats', JSON.stringify(appState.stats));
            localStorage.setItem('secExamQuestions', JSON.stringify(appState.questions));
            updateStatsUI();
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            const icon = toast.querySelector('i');
            toast.querySelector('span').innerText = msg;
            
            if(isError) {
                icon.className = 'fa-solid fa-circle-exclamation text-red-400';
                toast.classList.replace('bg-gray-800', 'bg-red-900');
            } else {
                icon.className = 'fa-solid fa-circle-check text-green-400';
                toast.classList.replace('bg-red-900', 'bg-gray-800');
            }

            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // --- UI 切換邏輯 ---
        function switchTab(tab) {
            document.getElementById('practice-section').classList.add('hidden');
            document.getElementById('manage-section').classList.add('hidden');
            
            document.getElementById('tab-practice').classList.replace('bg-blue-600', 'bg-slate-700');
            document.getElementById('tab-manage').classList.replace('bg-blue-600', 'bg-slate-700');

            if (tab === 'practice') {
                document.getElementById('practice-section').classList.remove('hidden');
                document.getElementById('tab-practice').classList.replace('bg-slate-700', 'bg-blue-600');
                if(!currentQuestion) loadRandomQuestion();
            } else {
                document.getElementById('manage-section').classList.remove('hidden');
                document.getElementById('tab-manage').classList.replace('bg-slate-700', 'bg-blue-600');
                renderBankPreview();
            }
        }

        function updateStatsUI() {
            document.getElementById('stat-total').innerText = appState.questions.length;
            document.getElementById('stat-streak').innerText = appState.stats.streak;
            
            let acc = 0;
            if (appState.stats.totalAnswered > 0) {
                acc = Math.round((appState.stats.correct / appState.stats.totalAnswered) * 100);
            }
            document.getElementById('stat-accuracy').innerText = `${acc}%`;
        }

        // --- 核心：測驗邏輯 ---
        function loadRandomQuestion() {
            if (appState.questions.length === 0) {
                document.getElementById('q-source').innerText = "系統提示";
                document.getElementById('q-text').innerText = "目前題庫中沒有任何題目了！請前往「題庫管理」新增題目。";
                document.getElementById('q-image-container').classList.add('hidden');
                document.getElementById('q-options').innerHTML = '';
                document.getElementById('feedback-area').classList.add('hidden');
                return;
            }

            // 重置介面
            const feedbackArea = document.getElementById('feedback-area');
            feedbackArea.classList.add('hidden');
            feedbackArea.classList.remove('pop-in');
            
            const optionsContainer = document.getElementById('q-options');
            optionsContainer.innerHTML = '';
            
            const imageContainer = document.getElementById('q-image-container');

            // 抽題
            const randomIndex = Math.floor(Math.random() * appState.questions.length);
            currentQuestion = appState.questions[randomIndex];

            // 渲染來源與文字
            document.getElementById('q-source').innerText = currentQuestion.source || "自訂題目";
            document.getElementById('q-text').innerText = currentQuestion.question;

            // 渲染圖片 (如果有)
            if (currentQuestion.image) {
                imageContainer.innerHTML = `<img src="${currentQuestion.image}" class="max-h-56 md:max-h-72 w-full object-contain rounded-lg border border-gray-200 shadow-sm">`;
                imageContainer.classList.remove('hidden');
            } else {
                imageContainer.innerHTML = '';
                imageContainer.classList.add('hidden');
            }

            currentQuestion.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left bg-white border-2 border-gray-200 p-3 md:p-4 rounded-xl font-medium text-gray-700 text-sm md:text-base';
                btn.innerHTML = `<span class="inline-block w-6 md:w-8 text-gray-400 font-bold">${String.fromCharCode(65 + index)}.</span> ${opt}`;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, clickedBtn) {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true); // 鎖定

            const isCorrect = (selectedIndex === currentQuestion.answerIndex);
            appState.stats.totalAnswered++;

            const feedbackArea = document.getElementById('feedback-area');
            const feedbackTitle = document.getElementById('feedback-title');
            const feedbackIcon = document.getElementById('feedback-icon');
            const feedbackExp = document.getElementById('feedback-explanation');

            if (isCorrect) {
                appState.stats.correct++;
                appState.stats.streak++;
                
                clickedBtn.classList.replace('border-gray-200', 'border-green-500');
                clickedBtn.classList.replace('bg-white', 'bg-green-50');
                clickedBtn.classList.add('text-green-700');

                feedbackArea.className = 'mt-4 md:mt-6 p-4 md:p-5 rounded-xl pop-in bg-green-50 border border-green-200 block';
                feedbackIcon.innerHTML = '<i class="fa-solid fa-circle-check text-green-500"></i>';
                feedbackTitle.innerText = '防禦成功！答對了';
                feedbackTitle.className = 'text-base md:text-lg font-bold text-green-700';
                
            } else {
                appState.stats.streak = 0; // 斷連勝
                
                clickedBtn.classList.replace('border-gray-200', 'border-red-500');
                clickedBtn.classList.replace('bg-white', 'bg-red-50');
                clickedBtn.classList.add('shake', 'text-red-700');

                // 標示正確答案
                const correctBtn = buttons[currentQuestion.answerIndex];
                correctBtn.classList.replace('border-gray-200', 'border-green-500');
                correctBtn.classList.add('border-2');

                feedbackArea.className = 'mt-4 md:mt-6 p-4 md:p-5 rounded-xl pop-in bg-red-50 border border-red-200 block';
                feedbackIcon.innerHTML = '<i class="fa-solid fa-triangle-exclamation text-red-500"></i>';
                feedbackTitle.innerText = '系統遭駭！答錯了';
                feedbackTitle.className = 'text-base md:text-lg font-bold text-red-700';
            }

            feedbackExp.innerHTML = `<strong>解析：</strong>${currentQuestion.explanation || "本題無提供解析。"}`;
            saveState(); // 儲存統計數據
        }

        // --- 圖片上傳與壓縮處理 ---
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // 使用 Canvas 壓縮圖片以防 LocalStorage 爆掉
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    const MAX_HEIGHT = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // 轉換為 Base64 (JPEG 格式，品質 0.8)
                    const base64Str = canvas.toDataURL('image/jpeg', 0.8);
                    currentUploadedImage = base64Str;
                    
                    document.getElementById('preview-img').src = base64Str;
                    document.getElementById('image-preview-container').classList.remove('hidden');
                    document.getElementById('clear-image-btn').classList.remove('hidden');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function clearUploadedImage() {
            currentUploadedImage = null;
            document.getElementById('new-q-image').value = '';
            document.getElementById('image-preview-container').classList.add('hidden');
            document.getElementById('clear-image-btn').classList.add('hidden');
            document.getElementById('preview-img').src = '';
        }

        // --- 手動新增/編輯 題目邏輯 ---
        function showAddModal(editIndex = -1) {
            currentEditIndex = editIndex;
            const form = document.getElementById('add-q-form');
            const title = document.getElementById('modal-title');
            const submitBtn = document.getElementById('modal-submit-btn');

            // 每次開啟前先重置表單與圖片
            clearUploadedImage();
            form.reset();

            if (editIndex !== -1) {
                // 編輯模式：載入原有資料
                title.innerHTML = '<i class="fa-solid fa-pen-to-square text-blue-500 mr-2"></i>編輯考題';
                submitBtn.innerText = '儲存修改';
                
                const q = appState.questions[editIndex];
                document.getElementById('new-q-source').value = q.source || '';
                document.getElementById('new-q-text').value = q.question || '';
                document.getElementById('new-q-optA').value = q.options[0] || '';
                document.getElementById('new-q-optB').value = q.options[1] || '';
                document.getElementById('new-q-optC').value = q.options[2] || '';
                document.getElementById('new-q-optD').value = q.options[3] || '';
                document.getElementById('new-q-ans').value = q.answerIndex || 0;
                document.getElementById('new-q-exp').value = q.explanation || '';
                
                // 載入原有圖片
                if (q.image) {
                    currentUploadedImage = q.image;
                    document.getElementById('preview-img').src = q.image;
                    document.getElementById('image-preview-container').classList.remove('hidden');
                    document.getElementById('clear-image-btn').classList.remove('hidden');
                }
            } else {
                // 新增模式
                title.innerHTML = '<i class="fa-solid fa-plus text-blue-500 mr-2"></i>手動新增考題';
                submitBtn.innerText = '儲存並新增';
            }

            document.getElementById('add-modal').classList.remove('hidden');
            document.getElementById('add-modal').classList.add('flex');
        }

        function closeAddModal() {
            document.getElementById('add-modal').classList.add('hidden');
            document.getElementById('add-modal').classList.remove('flex');
        }

        function saveNewQuestion() {
            const form = document.getElementById('add-q-form');
            if(!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const newQ = {
                source: document.getElementById('new-q-source').value,
                question: document.getElementById('new-q-text').value,
                options: [
                    document.getElementById('new-q-optA').value,
                    document.getElementById('new-q-optB').value,
                    document.getElementById('new-q-optC').value,
                    document.getElementById('new-q-optD').value
                ],
                answerIndex: parseInt(document.getElementById('new-q-ans').value),
                explanation: document.getElementById('new-q-exp').value
            };

            // 如果有附圖就存進去
            if (currentUploadedImage) {
                newQ.image = currentUploadedImage;
            }

            if (currentEditIndex !== -1) {
                // 覆寫編輯的題目
                appState.questions[currentEditIndex] = newQ;
                showToast('考題修改成功！');
            } else {
                // 新增到陣列最前面
                appState.questions.unshift(newQ);
                showToast('考題新增成功！');
            }
            
            saveState();
            renderBankPreview();
            closeAddModal();
            form.reset();
        }

        function deleteQuestion(index) {
            if (confirm("這項操作無法復原，您確定要刪除這道題目嗎？")) {
                appState.questions.splice(index, 1);
                saveState();
                renderBankPreview();
                showToast("考題已成功刪除");
            }
        }

        // --- 檔案管理與匯入匯出 ---
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    
                    // 簡單驗證格式
                    if(!Array.isArray(importedData) || !importedData[0].hasOwnProperty('question')) {
                        throw new Error("格式不符");
                    }

                    // 將新題目插入到現有題目前面
                    appState.questions = [...importedData, ...appState.questions];
                    saveState();
                    renderBankPreview();
                    showToast(`成功匯入 ${importedData.length} 題！`);
                    
                    event.target.value = ''; // 重置 input
                } catch (error) {
                    showToast('匯入失敗：檔案格式錯誤，請確定是標準 JSON。', true);
                    console.error(error);
                }
            };
            reader.readAsText(file);
        }

        function downloadTemplate() {
            const template = [
                {
                    "source": "111年度 - 資訊安全管理",
                    "question": "這是一道範例題目，請將內容替換為真實考題。請問下列何者屬於非對稱式加密演算法？",
                    "options": ["AES", "RSA", "DES", "MD5"],
                    "answerIndex": 1,
                    "explanation": "RSA 屬於非對稱式加密。AES 和 DES 為對稱式，MD5 為雜湊演算法。"
                }
            ];
            triggerDownload(template, "資安題庫_上傳範本.json");
        }

        function downloadCurrentBank() {
            triggerDownload(appState.questions, "我的資安特訓題庫.json");
        }

        function triggerDownload(dataObj, filename) {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dataObj, null, 4));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", filename);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            showToast('檔案下載中...');
        }

        function resetBank() {
            if(confirm("警告：這將會清除您匯入及新增的所有自訂題目，並重置答題紀錄！確定要恢復原廠預設題庫嗎？")) {
                appState = {
                    questions: [...defaultQuestions],
                    stats: { totalAnswered: 0, correct: 0, streak: 0, maxStreak: 0 }
                };
                saveState();
                renderBankPreview();
                showToast('系統已重置完成');
                
                // 如果目前在實戰頁面，重新抽題
                if(!document.getElementById('practice-section').classList.contains('hidden')){
                    loadRandomQuestion();
                }
            }
        }

        function renderBankPreview() {
            const container = document.getElementById('bank-preview');
            document.getElementById('preview-count').innerText = appState.questions.length;
            container.innerHTML = '';

            // 渲染所有題目供管理 
            appState.questions.forEach((q, idx) => {
                const hasImage = q.image ? '<span class="ml-1 md:ml-2 inline-flex items-center px-1.5 py-0.5 rounded text-[10px] md:text-xs font-medium bg-purple-100 text-purple-800"><i class="fa-regular fa-image mr-1"></i>附圖</span>' : '';
                
                const div = document.createElement('div');
                div.className = 'bg-white border border-gray-200 p-3 rounded-lg flex flex-col md:flex-row gap-3 md:items-start hover:border-blue-300 transition group shadow-sm';
                div.innerHTML = `
                    <div class="flex gap-2 md:gap-3 items-start w-full">
                        <div class="bg-slate-100 text-slate-500 px-2 py-1 rounded text-xs font-bold shrink-0 mt-1">#${idx+1}</div>
                        <div class="flex-grow">
                            <div class="text-xs text-blue-500 font-semibold mb-1">${q.source || "自訂題目"} ${hasImage}</div>
                            <div class="text-gray-700 text-sm md:text-base line-clamp-3 md:line-clamp-none">${q.question}</div>
                        </div>
                    </div>
                    <div class="flex gap-2 shrink-0 opacity-100 md:opacity-0 md:group-hover:opacity-100 focus-within:opacity-100 transition w-full md:w-auto justify-end border-t md:border-t-0 pt-2 md:pt-0 mt-1 md:mt-0">
                        <button onclick="showAddModal(${idx})" class="text-blue-500 hover:text-blue-700 bg-blue-50 md:bg-transparent md:hover:bg-blue-50 px-3 py-2 md:p-2 rounded-md transition flex items-center gap-1 active:bg-blue-100" title="編輯此題">
                            <i class="fa-solid fa-pen"></i> <span class="md:hidden text-xs font-bold">編輯</span>
                        </button>
                        <button onclick="deleteQuestion(${idx})" class="text-red-400 hover:text-red-600 bg-red-50 md:bg-transparent md:hover:bg-red-50 px-3 py-2 md:p-2 rounded-md transition flex items-center gap-1 active:bg-red-100" title="刪除此題">
                            <i class="fa-solid fa-trash-can text-lg"></i> <span class="md:hidden text-xs font-bold">刪除</span>
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // 啟動應用程式
        window.onload = initApp;
    </script>
</body>
</html>
